<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>상품 상세 — 라이브박스</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Cormorant+Garamond:ital,wght@0,300;1,300&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--cream:#F7F5F2;--ivory:#EEEBE5;--charcoal:#1E1E1E;--gray:#8A8885;--accent:#A8825A;--white:#FFF;--red:#C0392B;--live:#E8392A;--border:rgba(30,30,30,0.1);--serif:'Cormorant Garamond',serif;--sans:'Noto Sans KR',sans-serif}
body{font-family:var(--sans);background:var(--white);color:var(--charcoal);font-size:14px}
a{text-decoration:none;color:inherit}
header{background:var(--white);border-bottom:.5px solid var(--border);position:sticky;top:0;z-index:100}
.header-inner{max-width:1200px;margin:0 auto;padding:0 40px;display:flex;align-items:center;justify-content:space-between;height:68px}
.logo{display:flex;align-items:center;gap:10px}
.logo-box{width:36px;height:36px;background:var(--charcoal);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:white;border-radius:4px}
.logo-name{font-size:18px;font-weight:700;letter-spacing:-.02em;color:var(--charcoal)}
.logo-name span{color:var(--live)}
.hdr-icon{display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 12px;cursor:pointer;color:var(--charcoal);border:none;background:none;font-family:var(--sans);transition:color .2s;position:relative}
.hdr-icon:hover{color:var(--live)}
.hdr-icon svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.5}
.hdr-icon span{font-size:10px}
.hdr-badge{position:absolute;top:3px;right:6px;background:var(--live);color:white;border-radius:50%;width:14px;height:14px;font-size:8px;font-weight:700;display:flex;align-items:center;justify-content:center}
.breadcrumb{max-width:1200px;margin:0 auto;padding:16px 40px;font-size:12px;color:var(--gray);display:flex;align-items:center;gap:8px}
.breadcrumb a{color:var(--gray);transition:color .2s}
.breadcrumb a:hover{color:var(--charcoal)}
.main{max-width:1200px;margin:0 auto;padding:0 40px 80px;display:grid;grid-template-columns:1fr 1fr;gap:60px}
.img-area{}
.img-main{width:100%;aspect-ratio:1;background:var(--cream);display:flex;align-items:center;justify-content:center;margin-bottom:12px;position:relative;overflow:hidden}
.img-main-inner{width:100%;height:100%;display:flex;align-items:center;justify-content:center}
.img-main img{width:100%;height:100%;object-fit:cover}
.img-icon{font-family:var(--serif);font-size:60px;font-style:italic;color:rgba(30,30,30,.1)}
.img-thumbs{display:flex;gap:8px}
.img-thumb{width:72px;height:72px;background:var(--cream);cursor:pointer;border:2px solid transparent;transition:border-color .2s;flex-shrink:0;overflow:hidden}
.img-thumb.active{border-color:var(--charcoal)}
.img-thumb img{width:100%;height:100%;object-fit:cover}
.info-area{padding-top:8px}
.prod-badge{display:inline-block;padding:3px 10px;font-size:10px;font-weight:700;letter-spacing:.08em;margin-bottom:16px}
.prod-badge.live{background:var(--live);color:white}
.prod-badge.best{background:var(--charcoal);color:white}
.prod-badge.new{background:var(--accent);color:white}
.prod-badge.sale{background:var(--red);color:white}
.prod-brand{font-size:12px;color:var(--gray);letter-spacing:.06em;margin-bottom:8px}
.prod-name{font-size:26px;font-weight:500;line-height:1.3;margin-bottom:20px;letter-spacing:-.02em}
.price-section{background:var(--cream);padding:20px;margin-bottom:24px}
.price-orig-row{font-size:13px;color:var(--gray);text-decoration:line-through;margin-bottom:4px}
.price-main-row{display:flex;align-items:baseline;gap:12px}
.price-big{font-size:30px;font-weight:700;letter-spacing:-.03em}
.price-disc{font-size:16px;font-weight:700;color:var(--red)}
.price-save{font-size:12px;color:var(--gray);margin-top:6px}
.qty-row{display:flex;align-items:center;gap:0;margin-bottom:24px}
.qty-label{font-size:13px;font-weight:500;margin-right:20px;min-width:40px}
.qty-ctrl{display:flex;align-items:center;border:1px solid var(--border)}
.qty-btn{width:36px;height:36px;border:none;background:none;cursor:pointer;font-size:18px;color:var(--charcoal);transition:background .15s;display:flex;align-items:center;justify-content:center}
.qty-btn:hover{background:var(--cream)}
.qty-input{width:48px;height:36px;border:none;border-left:1px solid var(--border);border-right:1px solid var(--border);text-align:center;font-family:var(--sans);font-size:14px;font-weight:500;outline:none}
.total-row{display:flex;align-items:center;justify-content:space-between;padding:16px 0;border-top:.5px solid var(--border);border-bottom:.5px solid var(--border);margin-bottom:20px}
.total-label{font-size:13px;color:var(--gray)}
.total-price{font-size:22px;font-weight:700;color:var(--live)}
.btn-row{display:grid;grid-template-columns:1fr 2fr;gap:10px;margin-bottom:16px}
.btn-wish{background:none;border:1.5px solid var(--border);padding:14px;font-family:var(--sans);font-size:13px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .2s;color:var(--charcoal)}
.btn-wish:hover{border-color:var(--charcoal)}
.btn-wish svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.5}
.btn-wish.active{border-color:var(--red);color:var(--red)}
.btn-wish.active svg{fill:var(--red);stroke:var(--red)}
.btn-cart{background:var(--charcoal);color:white;border:none;padding:14px;font-family:var(--sans);font-size:13px;font-weight:500;cursor:pointer;transition:background .2s;letter-spacing:.06em}
.btn-cart:hover{background:var(--live)}
.btn-buy{background:var(--live);color:white;border:none;padding:14px;font-family:var(--sans);font-size:13px;font-weight:600;cursor:pointer;width:100%;transition:background .2s;letter-spacing:.06em}
.btn-buy:hover{background:#C82A1A}
.shipping-info{background:var(--cream);padding:16px;font-size:12px;color:var(--gray);line-height:1.8;margin-top:16px}
.shipping-info b{color:var(--charcoal);font-weight:500}
.tab-row{display:flex;border-bottom:1px solid var(--border);margin:60px 0 0;max-width:1200px;margin-left:auto;margin-right:auto;padding:0 40px}
.tab{padding:14px 24px;font-size:13px;font-weight:500;color:var(--gray);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s}
.tab.active{color:var(--charcoal);border-bottom-color:var(--charcoal)}
.tab-content{max-width:1200px;margin:0 auto;padding:40px 40px 80px}
.desc-box{font-size:14px;color:var(--charcoal);line-height:2;white-space:pre-line}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--charcoal);color:white;padding:12px 24px;border-radius:4px;font-size:13px;z-index:999;opacity:0;transition:all .3s;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
</style>
</head>
<body>
<header>
  <div class="header-inner">
    <a href="index.html" class="logo">
      <div class="logo-box">LB</div>
      <div><div class="logo-name">라이브<span>박스</span></div></div>
    </a>
    <div style="display:flex;gap:4px">
      <button class="hdr-icon" onclick="location.href='cart.html'" style="position:relative">
        <svg viewBox="0 0 24 24"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
        <span>장바구니</span>
        <span class="hdr-badge" id="cart-count">0</span>
      </button>
    </div>
  </div>
</header>
<div class="breadcrumb">
  <a href="index.html">홈</a> › <span id="bc-cat"></span> › <span id="bc-name"></span>
</div>
<div class="main" id="product-main">
  <div style="text-align:center;padding:80px;color:var(--gray);grid-column:1/-1">상품을 불러오는 중...</div>
</div>
<div class="tab-row">
  <div class="tab active" onclick="switchTab('desc')">상품 설명</div>
  <div class="tab" onclick="switchTab('delivery')">배송/교환 안내</div>
</div>
<div class="tab-content">
  <div id="tab-desc" class="desc-box"></div>
  <div id="tab-delivery" style="display:none;font-size:13px;line-height:2;color:var(--gray)">
    <b style="color:var(--charcoal);display:block;margin-bottom:8px">배송 안내</b>
    · 무료배송: 5만원 이상 구매 시<br>· 오늘출발: 오후 2시 전 주문 시 당일 출고<br>· 배송기간: 영업일 기준 2~3일<br><br>
    <b style="color:var(--charcoal);display:block;margin-bottom:8px">교환/반품</b>
    · 수령 후 7일 이내 교환/반품 가능<br>· 단순 변심 반품 시 왕복 배송비 부담<br>· 불량/오배송 시 무료 교환
  </div>
</div>
<div class="toast" id="toast"></div>
<script src="store.js"></script>
<script>
const params = new URLSearchParams(location.search);
const pid = params.get('id');
let product = null;
let qty = 1;

function updateCartBadge(){
  document.getElementById('cart-count').textContent = LB.getCartCount();
}

function switchTab(tab){
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',['desc','delivery'][i]===tab));
  document.getElementById('tab-desc').style.display = tab==='desc'?'':'none';
  document.getElementById('tab-delivery').style.display = tab==='delivery'?'':'none';
}

function updateQty(delta){
  qty = Math.max(1, qty+delta);
  document.getElementById('qty-input').value = qty;
  if(product) document.getElementById('total-price').textContent = (product.price*qty).toLocaleString()+'원';
}

function toggleWish(){
  const added = LB.toggleWishlist(pid);
  const btn = document.getElementById('wish-btn');
  btn.classList.toggle('active', added);
  showToast(added?'위시리스트에 추가되었습니다.':'위시리스트에서 제거되었습니다.');
}

function addToCart(){
  if(!product) return;
  for(let i=0;i<qty;i++) LB.addToCart(pid);
  updateCartBadge();
  showToast('장바구니에 담았습니다!');
}

function buyNow(){
  if(!product) return;
  LB.addToCart(pid, qty);
  location.href='cart.html';
}

let toastTimer;
function showToast(msg){
  clearTimeout(toastTimer);
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  toastTimer = setTimeout(()=>t.classList.remove('show'), 2500);
}

function render(p){
  const disc = p.original&&p.original>p.price?Math.round((1-p.price/p.original)*100):0;
  const badgeCls = {LIVE:'live',BEST:'best',NEW:'new',SALE:'sale','🔴 LIVE':'live'}[p.badge]||'new';
  const wished = LB.getWishlist().includes(pid);
  const bgColor = LB.BG[0];
  const icon = LB.ICONS[0];
  const imgHtml = p.images&&p.images[0]
    ? `<img src="${p.images[0]}" alt="${p.name}">`
    : `<div class="img-icon">${icon}</div>`;

  document.getElementById('bc-cat').textContent = p.category||'';
  document.getElementById('bc-name').textContent = p.name;
  document.getElementById('tab-desc').textContent = p.desc||'상품 설명이 없습니다.';

  document.getElementById('product-main').innerHTML = `
    <div class="img-area">
      <div class="img-main"><div class="img-main-inner" style="background:${bgColor}">${imgHtml}</div></div>
      ${p.images&&p.images.length>1?`<div class="img-thumbs">${p.images.map((img,i)=>`<div class="img-thumb ${i===0?'active':''}" onclick="setImg(this,'${img}')"><img src="${img}"></div>`).join('')}</div>`:''}
    </div>
    <div class="info-area">
      ${p.badge?`<div class="prod-badge ${badgeCls}">${p.badge}</div>`:''}
      <div class="prod-brand">${p.brand||p.category||''}</div>
      <div class="prod-name">${p.name}</div>
      <div class="price-section">
        ${disc?`<div class="price-orig-row">정가 ${p.original.toLocaleString()}원</div>`:''}
        <div class="price-main-row">
          <span class="price-big">${p.price.toLocaleString()}원</span>
          ${disc?`<span class="price-disc">${disc}% 할인</span>`:''}
        </div>
        ${disc?`<div class="price-save">지금 구매하면 ${(p.original-p.price).toLocaleString()}원 절약!</div>`:''}
      </div>
      <div class="qty-row">
        <span class="qty-label">수량</span>
        <div class="qty-ctrl">
          <button class="qty-btn" onclick="updateQty(-1)">−</button>
          <input type="number" id="qty-input" class="qty-input" value="1" min="1" onchange="qty=Math.max(1,parseInt(this.value)||1);this.value=qty;document.getElementById('total-price').textContent=(${p.price}*qty).toLocaleString()+'원'">
          <button class="qty-btn" onclick="updateQty(1)">+</button>
        </div>
      </div>
      <div class="total-row">
        <span class="total-label">총 결제금액</span>
        <span class="total-price" id="total-price">${p.price.toLocaleString()}원</span>
      </div>
      <div class="btn-row">
        <button class="btn-wish ${wished?'active':''}" id="wish-btn" onclick="toggleWish()">
          <svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
          위시리스트
        </button>
        <button class="btn-cart" onclick="addToCart()">장바구니 담기</button>
      </div>
      <button class="btn-buy" onclick="buyNow()">바로 구매하기</button>
      <div class="shipping-info">
        <b>무료배송</b> 5만원 이상 · <b>오늘출발</b> 오후 2시 전 주문 · <b>무료 교환/반품</b>
      </div>
    </div>`;
}

// Load product
if(pid){
  const all = LB.getActiveProducts();
  product = all.find(p=>p.id===pid);
  if(product){ render(product); updateCartBadge(); }
  else { document.getElementById('product-main').innerHTML='<p style="grid-column:1/-1;text-align:center;padding:80px;color:var(--gray)">상품을 찾을 수 없습니다. <a href="index.html" style="color:var(--live)">홈으로</a></p>'; }
} else location.href='index.html';

function setImg(el, src){
  document.querySelectorAll('.img-thumb').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  const main = document.querySelector('.img-main-inner');
  main.innerHTML = `<img src="${src}" style="width:100%;height:100%;object-fit:cover">`;
}
</script>
</body>
</html>
