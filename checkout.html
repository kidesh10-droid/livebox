<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>주문/결제 — 라이브박스</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--cream:#F7F5F2;--charcoal:#1E1E1E;--gray:#8A8885;--accent:#A8825A;--white:#FFF;--red:#C0392B;--live:#E8392A;--border:rgba(30,30,30,0.1);--sans:'Noto Sans KR',sans-serif}
body{font-family:var(--sans);background:var(--cream);color:var(--charcoal);font-size:14px}
header{background:var(--white);border-bottom:.5px solid var(--border)}
.header-inner{max-width:1000px;margin:0 auto;padding:0 32px;display:flex;align-items:center;justify-content:space-between;height:60px}
.logo-name{font-size:17px;font-weight:700;color:var(--charcoal)}
.logo-name span{color:var(--live)}
.steps{display:flex;justify-content:center;padding:20px 0;gap:0}
.step{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--gray);padding:0 20px}
.step-num{width:24px;height:24px;border-radius:50%;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}
.step.active .step-num{background:var(--charcoal);color:white;border-color:var(--charcoal)}
.step.active{color:var(--charcoal);font-weight:500}
.step-line{width:40px;height:1px;background:var(--border)}
.page-wrap{max-width:1000px;margin:0 auto;padding:24px 32px 80px;display:grid;grid-template-columns:1fr 320px;gap:20px;align-items:start}
.section-box{background:var(--white);border:.5px solid var(--border);margin-bottom:16px;overflow:hidden}
.section-head{padding:16px 20px;border-bottom:.5px solid var(--border);font-size:14px;font-weight:700;letter-spacing:-.01em}
.section-body{padding:20px}
.form-group{margin-bottom:16px}
.form-label{font-size:11px;font-weight:600;letter-spacing:.04em;color:var(--charcoal);margin-bottom:6px;display:block}
.form-label .req{color:var(--red)}
.form-input,.form-select{width:100%;border:1px solid var(--border);border-radius:4px;padding:10px 12px;font-family:var(--sans);font-size:13px;color:var(--charcoal);outline:none;transition:border-color .15s;background:var(--white)}
.form-input:focus,.form-select:focus{border-color:var(--charcoal)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.pay-methods{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:4px}
.pay-method{border:1.5px solid var(--border);padding:12px 8px;text-align:center;cursor:pointer;transition:all .2s;border-radius:4px;font-size:12px;font-weight:500}
.pay-method:hover{border-color:var(--charcoal)}
.pay-method.selected{border-color:var(--charcoal);background:var(--charcoal);color:white}
.pay-method-icon{font-size:18px;display:block;margin-bottom:4px}
.order-item{display:flex;gap:12px;padding:12px 0;border-bottom:.5px solid var(--border)}
.order-item:last-child{border-bottom:none}
.order-img{width:56px;height:56px;background:var(--cream);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--gray);overflow:hidden}
.order-img img{width:100%;height:100%;object-fit:cover}
.order-info{flex:1;min-width:0}
.order-name{font-size:12px;font-weight:500;margin-bottom:3px;line-height:1.4}
.order-sub{font-size:11px;color:var(--gray)}
.order-price{font-size:13px;font-weight:700;text-align:right;flex-shrink:0}
.summary-panel{background:var(--white);border:.5px solid var(--border);padding:20px;position:sticky;top:80px}
.sum-row{display:flex;justify-content:space-between;font-size:13px;margin-bottom:10px}
.sum-total{font-size:17px;font-weight:700;color:var(--live);border-top:.5px solid var(--border);padding-top:12px;margin-top:4px;display:flex;justify-content:space-between}
.btn-pay{width:100%;background:var(--live);color:white;border:none;padding:15px;font-family:var(--sans);font-size:14px;font-weight:700;cursor:pointer;letter-spacing:.06em;margin-top:16px;transition:background .2s;border-radius:2px}
.btn-pay:hover{background:#C82A1A}
.agree-row{display:flex;align-items:flex-start;gap:8px;margin-top:12px;font-size:11px;color:var(--gray);line-height:1.5}
.agree-row input{flex-shrink:0;margin-top:2px;accent-color:var(--charcoal)}
</style>
</head>
<body>
<header>
  <div class="header-inner">
    <div class="logo-name">라이브<span>박스</span></div>
    <a href="cart.html" style="font-size:12px;color:var(--gray)">← 장바구니로</a>
  </div>
</header>
<div class="steps">
  <div class="step active"><div class="step-num">1</div><span>주문정보</span></div>
  <div class="step-line"></div>
  <div class="step active"><div class="step-num">2</div><span>결제수단</span></div>
  <div class="step-line"></div>
  <div class="step"><div class="step-num">3</div><span>완료</span></div>
</div>
<div class="page-wrap">
  <div>
    <div class="section-box">
      <div class="section-head">주문자 정보</div>
      <div class="section-body">
        <div class="form-row">
          <div class="form-group"><label class="form-label">이름 <span class="req">*</span></label><input type="text" class="form-input" id="f-name" placeholder="홍길동"></div>
          <div class="form-group"><label class="form-label">연락처 <span class="req">*</span></label><input type="tel" class="form-input" id="f-phone" placeholder="010-0000-0000"></div>
        </div>
        <div class="form-group"><label class="form-label">이메일</label><input type="email" class="form-input" id="f-email" placeholder="example@email.com"></div>
      </div>
    </div>
    <div class="section-box">
      <div class="section-head">배송지 정보</div>
      <div class="section-body">
        <div class="form-group"><label class="form-label">받는 분 <span class="req">*</span></label><input type="text" class="form-input" id="f-recv" placeholder="홍길동"></div>
        <div class="form-group"><label class="form-label">연락처 <span class="req">*</span></label><input type="tel" class="form-input" id="f-rphone" placeholder="010-0000-0000"></div>
        <div class="form-group"><label class="form-label">주소 <span class="req">*</span></label><input type="text" class="form-input" id="f-addr" placeholder="서울시 강남구 테헤란로 123" style="margin-bottom:8px"><input type="text" class="form-input" id="f-addr2" placeholder="상세주소 (동/호수 등)"></div>
        <div class="form-group"><label class="form-label">배송 요청사항</label><input type="text" class="form-input" id="f-req" placeholder="예: 부재 시 경비실에 맡겨주세요"></div>
      </div>
    </div>
    <div class="section-box">
      <div class="section-head">결제 수단</div>
      <div class="section-body">
        <div class="pay-methods" id="pay-methods">
          <div class="pay-method selected" data-method="card" onclick="selectPay(this)"><span class="pay-method-icon">💳</span>신용/체크카드</div>
          <div class="pay-method" data-method="kakao" onclick="selectPay(this)"><span class="pay-method-icon">💛</span>카카오페이</div>
          <div class="pay-method" data-method="naver" onclick="selectPay(this)"><span class="pay-method-icon">🟢</span>네이버페이</div>
          <div class="pay-method" data-method="toss" onclick="selectPay(this)"><span class="pay-method-icon">🔵</span>토스페이</div>
          <div class="pay-method" data-method="bank" onclick="selectPay(this)"><span class="pay-method-icon">🏦</span>무통장입금</div>
          <div class="pay-method" data-method="phone" onclick="selectPay(this)"><span class="pay-method-icon">📱</span>휴대폰결제</div>
        </div>
      </div>
    </div>
  </div>
  <div>
    <div class="summary-panel">
      <div style="font-size:14px;font-weight:700;margin-bottom:16px;padding-bottom:12px;border-bottom:.5px solid var(--border)">주문 상품</div>
      <div id="order-items"></div>
      <div style="margin-top:16px;padding-top:12px;border-top:.5px solid var(--border)">
        <div class="sum-row"><span>상품금액</span><span id="s-goods">0원</span></div>
        <div class="sum-row"><span>배송비</span><span id="s-ship">무료</span></div>
        <div class="sum-total"><span>최종결제금액</span><span id="s-total">0원</span></div>
      </div>
      <div class="agree-row"><input type="checkbox" id="agree" checked><label for="agree">주문 내용을 확인하였으며, 개인정보 수집 및 결제에 동의합니다.</label></div>
      <button class="btn-pay" onclick="doPay()">결제하기</button>
    </div>
  </div>
</div>
<script src="store.js"></script>
<script>
let selectedMethod = 'card';
let checkoutItems = [];

function selectPay(el){
  document.querySelectorAll('.pay-method').forEach(m=>m.classList.remove('selected'));
  el.classList.add('selected');
  selectedMethod = el.dataset.method;
}

function render(){
  const checkedIds = JSON.parse(sessionStorage.getItem('lb_checkout_items')||'[]');
  const cart = LB.getCart();
  const products = LB.getActiveProducts();

  checkoutItems = cart
    .filter(item=>!checkedIds.length||checkedIds.includes(item.productId))
    .map(item=>({...item, product:products.find(p=>p.id===item.productId)}))
    .filter(x=>x.product);

  if(!checkoutItems.length){ location.href='cart.html'; return; }

  const total = checkoutItems.reduce((s,item)=>s+item.product.price*item.qty,0);
  const ship = total>=50000?0:3000;

  document.getElementById('order-items').innerHTML = checkoutItems.map(item=>`
    <div class="order-item">
      <div class="order-img">${item.product.images&&item.product.images[0]?`<img src="${item.product.images[0]}">`:'IMG'}</div>
      <div class="order-info"><div class="order-name">${item.product.name}</div><div class="order-sub">수량 ${item.qty}개</div></div>
      <div class="order-price">${(item.product.price*item.qty).toLocaleString()}원</div>
    </div>`).join('');

  document.getElementById('s-goods').textContent = total.toLocaleString()+'원';
  document.getElementById('s-ship').textContent = ship===0?'무료':ship.toLocaleString()+'원';
  document.getElementById('s-total').textContent = (total+ship).toLocaleString()+'원';
}

function validate(){
  const required = [
    {id:'f-name',label:'주문자 이름'},
    {id:'f-phone',label:'주문자 연락처'},
    {id:'f-recv',label:'받는 분 이름'},
    {id:'f-rphone',label:'받는 분 연락처'},
    {id:'f-addr',label:'배송지 주소'},
  ];
  for(const f of required){
    const el = document.getElementById(f.id);
    if(!el.value.trim()){ el.focus(); alert(f.label+'을(를) 입력해주세요.'); return false; }
  }
  if(!document.getElementById('agree').checked){ alert('주문 내용에 동의해주세요.'); return false; }
  return true;
}

function doPay(){
  if(!validate()) return;
  const total = checkoutItems.reduce((s,item)=>s+item.product.price*item.qty,0);
  const ship = total>=50000?0:3000;
  const orderId = LB.generateOrderId();
  const order = {
    id: orderId,
    customer: document.getElementById('f-name').value,
    phone: document.getElementById('f-phone').value,
    email: document.getElementById('f-email').value,
    recv: document.getElementById('f-recv').value,
    addr: document.getElementById('f-addr').value+' '+document.getElementById('f-addr2').value,
    req: document.getElementById('f-req').value,
    items: checkoutItems.map(item=>({productId:item.productId,name:item.product.name,price:item.product.price,qty:item.qty})),
    amount: total+ship,
    ship,
    method: selectedMethod,
    status: '결제완료',
    date: new Date().toLocaleString('ko-KR'),
  };
  const orders = LB.getOrders();
  orders.unshift(order);
  LB.saveOrders(orders);
  // Remove ordered items from cart
  const remainCart = LB.getCart().filter(item=>!checkoutItems.find(ci=>ci.productId===item.productId));
  LB.saveCart(remainCart);
  sessionStorage.setItem('lb_last_order', JSON.stringify(order));
  location.href='complete.html';
}

render();
</script>
</body>
</html>
