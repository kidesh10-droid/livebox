<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>상품목록 — 라이브박스</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Cormorant+Garamond:ital,wght@0,300;1,300&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--cream:#F7F5F2;--ivory:#EEEBE5;--charcoal:#1E1E1E;--gray:#8A8885;--accent:#A8825A;--white:#FFF;--red:#C0392B;--live:#E8392A;--border:rgba(30,30,30,0.1);--serif:'Cormorant Garamond',serif;--sans:'Noto Sans KR',sans-serif}
body{font-family:var(--sans);background:var(--cream);color:var(--charcoal);font-size:14px}
a{text-decoration:none;color:inherit}
header{background:var(--white);border-bottom:.5px solid var(--border);position:sticky;top:0;z-index:100}
.header-inner{max-width:1200px;margin:0 auto;padding:0 40px;display:flex;align-items:center;justify-content:space-between;height:64px}
.logo{display:flex;align-items:center;gap:10px}
.logo-box{width:34px;height:34px;background:var(--charcoal);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:white;border-radius:4px}
.logo-name{font-size:17px;font-weight:700;letter-spacing:-.02em;color:var(--charcoal)}
.logo-name span{color:var(--live)}
.search-area{flex:1;max-width:400px;margin:0 32px;position:relative}
.search-area input{width:100%;border:none;border-bottom:1px solid var(--border);background:transparent;padding:7px 32px 7px 4px;font-family:var(--sans);font-size:13px;outline:none}
.search-area input:focus{border-bottom-color:var(--charcoal)}
.search-area button{position:absolute;right:0;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer}
.hdr-icons{display:flex;gap:4px}
.hdr-icon{display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 10px;cursor:pointer;border:none;background:none;font-family:var(--sans);color:var(--charcoal);transition:color .2s;position:relative}
.hdr-icon:hover{color:var(--live)}
.hdr-icon svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.5}
.hdr-icon span{font-size:10px}
.hdr-badge{position:absolute;top:3px;right:4px;background:var(--live);color:white;border-radius:50%;width:14px;height:14px;font-size:8px;font-weight:700;display:flex;align-items:center;justify-content:center}
nav{background:var(--white);border-bottom:.5px solid var(--border)}
.nav-inner{max-width:1200px;margin:0 auto;padding:0 40px;display:flex;align-items:center}
.nav-all{padding:12px 18px;font-size:12px;font-weight:500;color:white;background:var(--charcoal);margin-right:4px;cursor:pointer;transition:background .2s}
.nav-all:hover{background:var(--live)}
.nav-link{padding:12px 14px;font-size:12px;color:var(--charcoal);transition:color .2s;cursor:pointer;white-space:nowrap;position:relative}
.nav-link:hover{color:var(--live)}
.nav-link.active::after{content:'';position:absolute;bottom:0;left:14px;right:14px;height:2px;background:var(--charcoal)}
.page-wrap{max-width:1200px;margin:0 auto;padding:28px 40px 80px;display:grid;grid-template-columns:220px 1fr;gap:28px;align-items:start}
/* SIDEBAR FILTER */
.filter-panel{background:var(--white);border:.5px solid var(--border);position:sticky;top:80px}
.filter-head{padding:16px 18px;border-bottom:.5px solid var(--border);font-size:13px;font-weight:700;display:flex;justify-content:space-between;align-items:center}
.filter-reset{font-size:11px;font-weight:400;color:var(--gray);cursor:pointer;border:none;background:none;font-family:var(--sans);transition:color .2s}
.filter-reset:hover{color:var(--live)}
.filter-section{padding:16px 18px;border-bottom:.5px solid var(--border)}
.filter-section:last-child{border-bottom:none}
.filter-section-title{font-size:11px;font-weight:700;letter-spacing:.1em;color:var(--gray);text-transform:uppercase;margin-bottom:12px}
.filter-option{display:flex;align-items:center;gap:8px;margin-bottom:9px;cursor:pointer;font-size:13px}
.filter-option input[type=checkbox]{width:14px;height:14px;accent-color:var(--charcoal);cursor:pointer}
.filter-option:hover{color:var(--live)}
.price-range{display:flex;gap:8px;align-items:center}
.price-input{width:80px;border:1px solid var(--border);padding:7px 8px;font-family:var(--sans);font-size:12px;outline:none;transition:border-color .15s}
.price-input:focus{border-color:var(--charcoal)}
/* PRODUCT AREA */
.prod-area{}
.list-toolbar{background:var(--white);border:.5px solid var(--border);padding:14px 18px;display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.list-title{font-size:16px;font-weight:700;letter-spacing:-.02em;display:flex;align-items:center;gap:10px}
.list-count{font-size:13px;font-weight:400;color:var(--gray)}
.sort-select{border:1px solid var(--border);padding:7px 12px;font-family:var(--sans);font-size:12px;color:var(--charcoal);background:var(--white);outline:none;cursor:pointer}
.view-btns{display:flex;gap:4px;margin-left:10px}
.view-btn{width:30px;height:30px;border:1px solid var(--border);background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.view-btn.active,.view-btn:hover{background:var(--charcoal);border-color:var(--charcoal)}
.view-btn.active svg,.view-btn:hover svg{stroke:white}
.view-btn svg{width:14px;height:14px;stroke:var(--gray);fill:none;stroke-width:1.8}
.product-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
.product-grid.list-view{grid-template-columns:1fr}
.product-card{background:var(--white);border:.5px solid var(--border);cursor:pointer;transition:all .2s;overflow:hidden}
.product-card:hover{box-shadow:0 4px 16px rgba(30,30,30,.1);transform:translateY(-2px)}
.product-img{width:100%;aspect-ratio:1;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center}
.product-img-inner{width:100%;height:100%;display:flex;align-items:center;justify-content:center;transition:transform .4s}
.product-card:hover .product-img-inner{transform:scale(1.04)}
.product-img img{width:100%;height:100%;object-fit:cover}
.product-img-icon{font-family:var(--serif);font-size:32px;font-style:italic;color:rgba(30,30,30,.1)}
.ptag-wrap{position:absolute;top:8px;left:8px;display:flex;flex-direction:column;gap:3px}
.ptag{font-size:9px;font-weight:700;padding:2px 6px;letter-spacing:.06em}
.ptag.best{background:var(--charcoal);color:white}
.ptag.new{background:var(--accent);color:white}
.ptag.sale{background:var(--red);color:white}
.ptag.live{background:var(--live);color:white}
.wish-btn{position:absolute;top:8px;right:8px;background:rgba(255,255,255,.9);border:none;cursor:pointer;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s}
.product-card:hover .wish-btn{opacity:1}
.wish-btn svg{width:15px;height:15px;stroke:var(--charcoal);fill:none;stroke-width:1.5}
.wish-btn.active svg{fill:var(--red);stroke:var(--red)}
.product-info{padding:14px}
.product-brand{font-size:10px;color:var(--gray);letter-spacing:.06em;margin-bottom:3px}
.product-name{font-size:13px;font-weight:500;margin-bottom:8px;line-height:1.4}
.price-row{display:flex;align-items:baseline;gap:6px;flex-wrap:wrap}
.price-now{font-size:15px;font-weight:700}
.price-orig{font-size:11px;color:var(--gray);text-decoration:line-through;font-weight:300}
.price-rate{font-size:11px;font-weight:700;color:var(--red)}
/* LIST VIEW */
.product-grid.list-view .product-card{display:grid;grid-template-columns:180px 1fr}
.product-grid.list-view .product-img{aspect-ratio:1;width:180px}
.product-grid.list-view .product-info{display:flex;flex-direction:column;justify-content:center;padding:20px 24px}
.product-grid.list-view .product-name{font-size:15px;margin-bottom:10px}
.product-grid.list-view .price-now{font-size:18px}
/* EMPTY */
.empty-state{grid-column:1/-1;padding:80px 20px;text-align:center;color:var(--gray)}
/* PAGINATION */
.pagination{display:flex;justify-content:center;gap:6px;margin-top:32px}
.page-btn{width:32px;height:32px;border:1px solid var(--border);background:var(--white);cursor:pointer;font-size:13px;font-family:var(--sans);display:flex;align-items:center;justify-content:center;transition:all .15s}
.page-btn:hover,.page-btn.active{background:var(--charcoal);color:white;border-color:var(--charcoal)}
/* ACTIVE FILTER TAGS */
.active-filters{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.filter-tag{display:flex;align-items:center;gap:6px;background:var(--charcoal);color:white;padding:4px 10px;font-size:11px;cursor:pointer}
.filter-tag:hover{background:var(--live)}
</style>
</head>
<body>
<header>
  <div class="header-inner">
    <a href="index.html" class="logo"><div class="logo-box">LB</div><div class="logo-name">라이브<span>박스</span></div></a>
    <div class="search-area">
      <input type="text" id="search-input" placeholder="상품 검색..." onkeydown="if(event.key==='Enter')applySearch()">
      <button onclick="applySearch()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.35-4.35"/></svg></button>
    </div>
    <div class="hdr-icons">
      <button class="hdr-icon" onclick="location.href='mypage.html'">
        <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span>마이페이지</span>
      </button>
      <button class="hdr-icon" onclick="location.href='cart.html'" style="position:relative">
        <svg viewBox="0 0 24 24"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg><span>장바구니</span>
        <span class="hdr-badge" id="cart-count">0</span>
      </button>
    </div>
  </div>
</header>
<nav>
  <div class="nav-inner">
    <div class="nav-all" onclick="location.href='index.html'">≡ 전체</div>
    <div class="nav-link" id="nav-new" onclick="setMode('new')">신상품</div>
    <div class="nav-link" id="nav-best" onclick="setMode('best')">인기베스트</div>
    <div class="nav-link" id="nav-생활가전" onclick="setMode('cat','생활가전')">생활가전</div>
    <div class="nav-link" id="nav-주방가전" onclick="setMode('cat','주방가전')">주방가전</div>
    <div class="nav-link" id="nav-청소/세탁" onclick="setMode('cat','청소/세탁')">청소/세탁</div>
    <div class="nav-link" id="nav-냉난방" onclick="setMode('cat','냉난방')">냉난방</div>
    <div class="nav-link" id="nav-sale" onclick="setMode('sale')">세일</div>
    <div class="nav-link" onclick="location.href='mypage.html'">마이페이지</div>
  </div>
</nav>

<div class="page-wrap">
  <!-- FILTER SIDEBAR -->
  <div class="filter-panel">
    <div class="filter-head">
      필터
      <button class="filter-reset" onclick="resetFilters()">초기화</button>
    </div>
    <div class="filter-section">
      <div class="filter-section-title">카테고리</div>
      <label class="filter-option"><input type="checkbox" class="f-cat" value="생활가전" onchange="applyFilters()"> 생활가전</label>
      <label class="filter-option"><input type="checkbox" class="f-cat" value="주방가전" onchange="applyFilters()"> 주방가전</label>
      <label class="filter-option"><input type="checkbox" class="f-cat" value="청소/세탁" onchange="applyFilters()"> 청소/세탁</label>
      <label class="filter-option"><input type="checkbox" class="f-cat" value="냉난방" onchange="applyFilters()"> 냉난방</label>
      <label class="filter-option"><input type="checkbox" class="f-cat" value="조명/인테리어" onchange="applyFilters()"> 조명/인테리어</label>
    </div>
    <div class="filter-section">
      <div class="filter-section-title">가격대</div>
      <div class="price-range">
        <input type="number" class="price-input" id="price-min" placeholder="최소" oninput="applyFilters()">
        <span style="color:var(--gray);font-size:12px">~</span>
        <input type="number" class="price-input" id="price-max" placeholder="최대" oninput="applyFilters()">
      </div>
    </div>
    <div class="filter-section">
      <div class="filter-section-title">상품 유형</div>
      <label class="filter-option"><input type="checkbox" id="f-sale" onchange="applyFilters()"> 할인상품</label>
      <label class="filter-option"><input type="checkbox" id="f-new" onchange="applyFilters()"> 신상품</label>
      <label class="filter-option"><input type="checkbox" id="f-live" onchange="applyFilters()"> 라이브특가</label>
    </div>
  </div>

  <!-- PRODUCT AREA -->
  <div class="prod-area">
    <div class="list-toolbar">
      <div class="list-title" id="list-title">전체 상품 <span class="list-count" id="list-count"></span></div>
      <div style="display:flex;align-items:center;gap:8px">
        <select class="sort-select" id="sort-select" onchange="applyFilters()">
          <option value="default">기본순</option>
          <option value="price-asc">낮은 가격순</option>
          <option value="price-desc">높은 가격순</option>
          <option value="discount">할인율 높은순</option>
          <option value="newest">신상품순</option>
        </select>
        <div class="view-btns">
          <button class="view-btn active" id="grid-btn" onclick="setView('grid')" title="그리드">
            <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
          </button>
          <button class="view-btn" id="list-btn" onclick="setView('list')" title="리스트">
            <svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
          </button>
        </div>
      </div>
    </div>
    <div class="active-filters" id="active-filters"></div>
    <div class="product-grid" id="product-grid"></div>
    <div class="pagination" id="pagination"></div>
  </div>
</div>

<script src="store.js"></script>
<script>
let currentMode = 'all';
let currentCat = '';
let currentView = 'grid';
let currentPage = 1;
const PER_PAGE = 12;

// URL 파라미터 읽기
const params = new URLSearchParams(location.search);
const modeParam = params.get('mode')||'all';
const catParam = params.get('cat')||'';
const qParam = params.get('q')||'';

function init(){
  if(qParam){ document.getElementById('search-input').value=qParam; }
  setMode(modeParam, catParam, true);
  document.getElementById('cart-count').textContent = LB.getCartCount();
}

function setMode(mode, cat='', init=false){
  currentMode = mode; currentCat = cat; currentPage = 1;
  document.querySelectorAll('.nav-link').forEach(el=>el.classList.remove('active'));
  const navEl = document.getElementById('nav-'+(cat||mode));
  if(navEl) navEl.classList.add('active');
  const titles = {new:'신상품',best:'인기 베스트',sale:'세일 상품',all:'전체 상품',cat:cat};
  document.getElementById('list-title').innerHTML = `${titles[mode]||cat} <span class="list-count" id="list-count"></span>`;
  if(!init) history.replaceState({},'',`?mode=${mode}${cat?'&cat='+encodeURIComponent(cat):''}${qParam?'&q='+encodeURIComponent(qParam):''}`);
  applyFilters();
}

function applyFilters(){
  let products = LB.getActiveProducts();
  // mode filter
  if(currentMode==='new') products = products.filter(p=>p.badge==='NEW'||p.badge==='new');
  else if(currentMode==='best') products = products.filter(p=>p.badge==='BEST'||p.badge==='best');
  else if(currentMode==='sale') products = products.filter(p=>p.original&&p.original>p.price);
  else if(currentMode==='cat') products = products.filter(p=>p.category===currentCat);
  // search
  const q = document.getElementById('search-input').value.toLowerCase().trim();
  if(q) products = products.filter(p=>p.name.toLowerCase().includes(q)||p.category.toLowerCase().includes(q)||(p.brand||'').toLowerCase().includes(q));
  // cat checkbox
  const catChecked = [...document.querySelectorAll('.f-cat:checked')].map(el=>el.value);
  if(catChecked.length) products = products.filter(p=>catChecked.includes(p.category));
  // price
  const minP = parseInt(document.getElementById('price-min').value)||0;
  const maxP = parseInt(document.getElementById('price-max').value)||Infinity;
  products = products.filter(p=>p.price>=minP&&p.price<=maxP);
  // type
  if(document.getElementById('f-sale').checked) products = products.filter(p=>p.original&&p.original>p.price);
  if(document.getElementById('f-new').checked) products = products.filter(p=>p.badge==='NEW');
  if(document.getElementById('f-live').checked) products = products.filter(p=>p.badge==='LIVE'||p.badge==='🔴 LIVE');
  // sort
  const sort = document.getElementById('sort-select').value;
  if(sort==='price-asc') products.sort((a,b)=>a.price-b.price);
  else if(sort==='price-desc') products.sort((a,b)=>b.price-a.price);
  else if(sort==='discount') products.sort((a,b)=>{
    const da=a.original?Math.round((1-a.price/a.original)*100):0;
    const db=b.original?Math.round((1-b.price/b.original)*100):0;
    return db-da;
  });
  renderProducts(products);
  renderActiveFilters(q, catChecked);
}

function applySearch(){ applyFilters(); }

function resetFilters(){
  document.querySelectorAll('.f-cat').forEach(el=>el.checked=false);
  document.getElementById('price-min').value='';
  document.getElementById('price-max').value='';
  document.getElementById('f-sale').checked=false;
  document.getElementById('f-new').checked=false;
  document.getElementById('f-live').checked=false;
  document.getElementById('sort-select').value='default';
  applyFilters();
}

function renderActiveFilters(q, catChecked){
  const wrap = document.getElementById('active-filters');
  const tags = [];
  if(q) tags.push({label:'검색: '+q, action:()=>{document.getElementById('search-input').value='';applyFilters();}});
  catChecked.forEach(c=>tags.push({label:c, action:()=>{document.querySelector(`.f-cat[value="${c}"]`).checked=false;applyFilters();}}));
  wrap.innerHTML = tags.map((t,i)=>`<div class="filter-tag" onclick="filterTagClick(${i})">✕ ${t.label}</div>`).join('');
  wrap._tags = tags;
}
function filterTagClick(i){ document.getElementById('active-filters')._tags[i].action(); }

function renderProducts(products){
  const total = products.length;
  document.getElementById('list-count').textContent = `(${total}개)`;
  const start=(currentPage-1)*PER_PAGE, end=start+PER_PAGE;
  const paged = products.slice(start,end);
  const grid = document.getElementById('product-grid');
  const wishlist = LB.getWishlist();
  if(!paged.length){
    grid.innerHTML='<div class="empty-state"><p style="font-size:14px;margin-bottom:8px">상품이 없어요.</p><p style="font-size:12px">다른 조건으로 검색해보세요.</p></div>';
    document.getElementById('pagination').innerHTML='';
    return;
  }
  const badgeCls = {LIVE:'live',BEST:'best',NEW:'new',SALE:'sale','🔴 LIVE':'live'};
  grid.innerHTML = paged.map((p,i)=>{
    const disc = p.original&&p.original>p.price?Math.round((1-p.price/p.original)*100):0;
    const wished = wishlist.includes(p.id);
    const imgHtml = p.images&&p.images[0]?`<img src="${p.images[0]}" alt="${p.name}">`:`<div class="product-img-icon">${LB.ICONS[i%LB.ICONS.length]}</div>`;
    return `<div class="product-card" onclick="location.href='product.html?id=${p.id}'">
      <div class="product-img">
        <div class="product-img-inner" style="background:${LB.BG[i%LB.BG.length]}">${imgHtml}</div>
        ${p.badge?`<div class="ptag-wrap"><span class="ptag ${badgeCls[p.badge]||'new'}">${p.badge}</span></div>`:''}
        <button class="wish-btn ${wished?'active':''}" onclick="event.stopPropagation();toggleWish(this,'${p.id}')">
          <svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        </button>
      </div>
      <div class="product-info">
        <div class="product-brand">${p.brand||p.category||''}</div>
        <div class="product-name">${p.name}</div>
        <div class="price-row">
          <span class="price-now">${p.price.toLocaleString()}원</span>
          ${disc?`<span class="price-orig">${p.original.toLocaleString()}원</span><span class="price-rate">${disc}%</span>`:''}
        </div>
      </div>
    </div>`;
  }).join('');
  // pagination
  const totalPages = Math.ceil(total/PER_PAGE);
  const pagi = document.getElementById('pagination');
  if(totalPages<=1){pagi.innerHTML='';return;}
  pagi.innerHTML = Array.from({length:totalPages},(_,i)=>`<button class="page-btn ${i+1===currentPage?'active':''}" onclick="goPage(${i+1})">${i+1}</button>`).join('');
}

function goPage(p){ currentPage=p; applyFilters(); window.scrollTo({top:0,behavior:'smooth'}); }
function setView(v){
  currentView=v;
  document.getElementById('product-grid').classList.toggle('list-view',v==='list');
  document.getElementById('grid-btn').classList.toggle('active',v==='grid');
  document.getElementById('list-btn').classList.toggle('active',v==='list');
}
function toggleWish(btn,id){
  const added=LB.toggleWishlist(id);
  btn.classList.toggle('active',added);
}

init();
window.addEventListener('cart-updated',()=>{ document.getElementById('cart-count').textContent=LB.getCartCount(); });
</script>
</body>
</html>
